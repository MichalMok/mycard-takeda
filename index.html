<!DOCTYPE html><html><head>
  <base href="/mycard-takeda/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="MyCard Takeda">
  <title>MyCard Takeda</title>
  <meta name="theme-color" content="#E60012">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/png" href="favicon.png?v=2">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: white;
    }

    /* Custom Takeda loading - covers Flutter's blue bar */
    #flutter-loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: white;
      z-index: 99999;
    }

    #flutter-loading img {
      width: 80px;
      margin-bottom: 24px;
    }

    #flutter-loading .progress {
      width: 200px;
      height: 3px;
      background-color: #fce4e4;
      border-radius: 2px;
      overflow: hidden;
    }

    #flutter-loading .progress-bar {
      height: 100%;
      background-color: #E60012;
      animation: loading 1.5s infinite ease-in-out;
    }

    @keyframes loading {
      0% { width: 0%; margin-left: 0%; }
      50% { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }
  </style>
  
  
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  
  
  
  
  
  
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #FFFFFF;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body>
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>
  
  
  
  
  <!-- Custom Takeda loading screen (hides blue bar) -->
  <div id="flutter-loading">
    <img src="assets/assets/takeda_logo.png" alt="Takeda">
    <div class="progress">
      <div class="progress-bar"></div>
    </div>
  </div>

  <!-- MSAL Library -->
  <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
  <script>
    if (typeof msal === 'undefined') {
      console.log("Primary MSAL CDN failed, trying fallback...");
      var script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js';
      document.head.appendChild(script);
    }
  </script>

  <script>
    function waitForMsal(callback, attempts) {
      if (typeof msal !== 'undefined') {
        callback();
      } else if (attempts > 0) {
        setTimeout(function() { waitForMsal(callback, attempts - 1); }, 200);
      } else {
        console.error("MSAL failed to load after all attempts");
      }
    }

    var msalInstance = null;

    function initMsal() {
      if (typeof msal === 'undefined') {
        console.error("MSAL library not available");
        return false;
      }

      const msalConfig = {
        auth: {
          clientId: "557430a7-d7d9-4a65-baeb-8f9819a60ef0",
          authority: "https://login.microsoftonline.com/57fdf63b-7e22-45a3-83dc-d37003163aae",
          redirectUri: window.location.origin,
        },
        cache: {
          cacheLocation: "localStorage",
          storeAuthStateInCookie: true,
        },
      };

      msalInstance = new msal.PublicClientApplication(msalConfig);
      console.log("MSAL initialized successfully");
      return true;
    }

    waitForMsal(function() {
      initMsal();
    }, 20);

    window.msalLogin = async function() {
      try {
        if (!msalInstance) {
          if (!initMsal()) {
            return JSON.stringify({
              success: false,
              error: "MSAL library not loaded. Check network/firewall."
            });
          }
        }

        const loginRequest = {
          scopes: ["User.Read", "openid", "profile", "email"]
        };

        const accounts = msalInstance.getAllAccounts();
        if (accounts.length > 0) {
          msalInstance.setActiveAccount(accounts[0]);
          try {
            const silentResult = await msalInstance.acquireTokenSilent({
              scopes: ["User.Read"],
              account: accounts[0]
            });
            return JSON.stringify({
              success: true,
              email: accounts[0].username,
              name: accounts[0].name,
              token: silentResult.accessToken
            });
          } catch (e) {
            console.log("Silent token failed, trying popup...");
          }
        }

        const result = await msalInstance.loginPopup(loginRequest);
        msalInstance.setActiveAccount(result.account);

        const tokenResult = await msalInstance.acquireTokenSilent({
          scopes: ["User.Read"],
          account: result.account
        });

        return JSON.stringify({
          success: true,
          email: result.account.username,
          name: result.account.name,
          token: tokenResult.accessToken
        });
      } catch (error) {
        console.error("MSAL Login Error:", error);
        return JSON.stringify({
          success: false,
          error: error.message || error.toString()
        });
      }
    };

    window.msalGetCurrentUser = function() {
      try {
        if (!msalInstance) {
          if (!initMsal()) {
            return JSON.stringify({ success: false, error: "MSAL not loaded" });
          }
        }
        const accounts = msalInstance.getAllAccounts();
        if (accounts.length > 0) {
          return JSON.stringify({
            success: true,
            email: accounts[0].username,
            name: accounts[0].name
          });
        }
        return JSON.stringify({ success: false, error: "No user logged in" });
      } catch (e) {
        return JSON.stringify({ success: false, error: e.toString() });
      }
    };

    window.msalLogout = function() {
      if (msalInstance) {
        msalInstance.logoutPopup();
      }
    };

    console.log("MSAL functions registered on window");
  </script>

  <!-- Remove custom loader when Flutter app is ready -->
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loader = document.getElementById('flutter-loading');
      if (loader) loader.remove();
    });
  </script>

  <!-- Flutter -->
  <script src="flutter_bootstrap.js" async=""></script>

</body></html>
